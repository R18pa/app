/* ═══════════════════════════════════════
   ANALYTICS NUTRICIONISTA (dashboard nutri)
═══════════════════════════════════════ */
function renderDashboardNutri(misPacientes) {
  if (!misPacientes || !misPacientes.length) return
  const hoy = new Date().toDateString()

  // Datos reales: progreso DEL DÍA actual
  const labels  = misPacientes.map(p => (p.nombre||'?').split(' ')[0])
  const progHoy = misPacientes.map(p => p.fecha === hoy ? (p.progreso || 0) : 0)
  const rachas  = misPacientes.map(p => p.racha || 0)

  // Colores según nivel de cumplimiento (paleta profesional)
  const colBar = progHoy.map(v =>
    v >= 80 ? 'rgba(128,150,113,.85)' :   // matcha
    v >= 50 ? 'rgba(210,171,128,.85)' :   // chai
              'rgba(192,87,72,.75)'        // rojo suave
  )
  const colBorder = progHoy.map(v =>
    v >= 80 ? '#809671' : v >= 50 ? '#D2AB80' : '#c05748'
  )

  // === Gráfica principal: Cumplimiento del día ===
  const ctx = document.getElementById('grafica-nutri')
  if (!ctx) return
  if (window._nutriChart) window._nutriChart.destroy()
  window._nutriChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Cumplimiento hoy (%)',
        data: progHoy,
        backgroundColor: colBar,
        borderColor: colBorder,
        borderWidth: 1.5,
        borderRadius: { topLeft: 8, topRight: 8 },
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 900, easing: 'easeOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#2a261e',
          titleColor: '#f0ead8',
          bodyColor: '#b8a98a',
          borderColor: '#4e4836',
          borderWidth: 1,
          cornerRadius: 8,
          padding: 10,
          callbacks: {
            title: ctx => ctx[0].label,
            label: ctx => ` ${ctx.parsed.y}% completado hoy`,
            afterLabel: ctx => {
              const p = misPacientes[ctx.dataIndex]
              return ` Racha: ${p.racha||0} días`
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true, max: 100,
          ticks: {
            color: '#7a6e58', font: { family: 'Inter', size: 11 },
            callback: v => v + '%', stepSize: 25
          },
          grid: { color: 'rgba(221,216,207,.5)', drawBorder: false },
          border: { display: false }
        },
        x: {
          ticks: { color: '#7a6e58', font: { family: 'Inter', size: 11 } },
          grid: { display: false },
          border: { display: false }
        }
      }
    }
  })

  // === Gráfica de rachas (sparkline horizontal) ===
  const ctxRacha = document.getElementById('grafica-rachas')
  if (ctxRacha) {
    if (window._rachaChart) window._rachaChart.destroy()
    const sortedR = [...misPacientes].sort((a,b)=>(b.racha||0)-(a.racha||0)).slice(0,6)
    window._rachaChart = new Chart(ctxRacha, {
      type: 'bar',
      data: {
        labels: sortedR.map(p => (p.nombre||'?').split(' ')[0]),
        datasets: [{
          label: 'Racha (días)',
          data: sortedR.map(p => p.racha||0),
          backgroundColor: 'rgba(210,171,128,.75)',
          borderColor: '#D2AB80',
          borderWidth: 1.5,
          borderRadius: { topLeft: 6, topRight: 6 },
          borderSkipped: false
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        animation: { duration: 700 },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#2a261e', titleColor: '#f0ead8',
            bodyColor: '#b8a98a', borderColor: '#4e4836', borderWidth: 1,
            cornerRadius: 8, padding: 8,
            callbacks: { label: ctx => ` ${ctx.parsed.x} días de racha` }
          }
        },
        scales: {
          x: {
            beginAtZero: true,
            ticks: { color: '#7a6e58', font: { family: 'Inter', size: 10 } },
            grid: { color: 'rgba(221,216,207,.4)', drawBorder: false },
            border: { display: false }
          },
          y: {
            ticks: { color: '#7a6e58', font: { family: 'Inter', size: 11 } },
            grid: { display: false },
            border: { display: false }
          }
        }
      }
    })
  }

  // === KPIs: Mejores del día y quiénes necesitan atención ===
  const sorted  = [...misPacientes].sort((a,b)=>(b.racha||0)-(a.racha||0))
  const atencion = misPacientes.filter(p => (p.fecha===hoy ? p.progreso||0 : 0) < 40)
  const sinActividad = misPacientes.filter(p => p.fecha !== hoy)

  const mejDiv = document.getElementById('mejores-rachas')
  const peoDiv = document.getElementById('peores-rachas')
  const sinDiv = document.getElementById('sin-actividad-hoy')

  if (mejDiv) mejDiv.innerHTML = sorted.slice(0,4).map(p=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;color:var(--text)">${p.nombre.split(' ')[0]}</span>
      <div style="display:flex;align-items:center;gap:6px">
        <div style="font-size:11px;color:var(--text3)">${p.fecha===hoy ? p.progreso+'% hoy' : 'sin actividad'}</div>
        <span class="badge badge-green">🔥 ${p.racha||0}d</span>
      </div>
    </div>`).join('')

  if (peoDiv) peoDiv.innerHTML = atencion.length
    ? atencion.slice(0,4).map(p=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px;color:var(--text)">${p.nombre.split(' ')[0]}</span>
        <span class="badge badge-red">${p.fecha===hoy ? p.progreso||0 : 0}% hoy</span>
      </div>`).join('')
    : `<p style="font-size:13px;color:var(--matcha);font-weight:600;padding:8px 0">¡Todos van bien hoy! ✓</p>`

  if (sinDiv) sinDiv.innerHTML = sinActividad.length
    ? sinActividad.slice(0,4).map(p=>`
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px;color:var(--text)">${p.nombre.split(' ')[0]}</span>
        <span class="badge badge-muted">Sin login hoy</span>
      </div>`).join('')
    : `<p style="font-size:13px;color:var(--matcha);font-weight:600;padding:8px 0">Todos activos hoy ✓</p>`
}

async function analisisProgreso() {
  if (!tieneAI()) return
  buildSidebarPaciente('ai')
  app.innerHTML = `
  <div class="card">
    <button class="btn btn-ghost" onclick="panelPaciente()" style="margin-bottom:14px">${icon('back')} Volver</button>
    <div class="card-header"><div class="card-title">Análisis AI de tu progreso</div></div>
    <div id="analisis-resultado" style="margin-top:8px;padding:16px;background:var(--green-light);border-radius:var(--radius);color:var(--matcha-deep);font-size:14px;line-height:1.7">
      <i>Analizando tu progreso...</i>
    </div>
  </div>`
  let hoy=diaActual(), marcadas=Object.values(pacienteActual.comidas||{}).filter(v=>v).length
  let dietaHoy=pacienteActual.dietasemanal?.[hoy]||{}
  let promptText=`Eres un nutricionista experto. Analiza el progreso de este paciente y da retroalimentación motivadora en español.\nDatos:\n- Nombre: ${pacienteActual.nombre}\n- Objetivo: ${pacienteActual.objetivo}\n- Calorías diarias: ${pacienteActual.calorias} kcal\n- Progreso hoy: ${pacienteActual.progreso}% (${marcadas}/5 comidas)\n- Racha: ${pacienteActual.racha} días\n- Dieta hoy (${hoy}): Desayuno: ${dietaHoy.desayuno||'no asignado'}, Almuerzo: ${dietaHoy.almuerzo||'no asignado'}, Cena: ${dietaHoy.cena||'no asignado'}\nDa un análisis breve (3-4 párrafos) con evaluación del día, motivación y 2 consejos prácticos.`
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:promptText}]})})
    const data=await res.json()
    const texto=(data.content||[]).map(b=>b.text||'').join('').replace(/\n/g,'<br>')
    document.getElementById('analisis-resultado').innerHTML=texto||'<i>Sin respuesta. Verifica la conexión.</i>'
  } catch(e) {
    document.getElementById('analisis-resultado').innerHTML='Error al conectar con AI. Intenta de nuevo.'
    toast('error','Error de conexión','No se pudo contactar con la IA')
  }
}

async function chatNutriAI() {
  if (!tieneAI()) return
  chatHistory=[]; buildSidebarPaciente('ai'); renderChat()
}

function renderChat() {
  app.innerHTML = `
  <div class="card">
    <button class="btn btn-ghost" onclick="panelPaciente()" style="margin-bottom:14px">${icon('back')} Volver</button>
    <div class="card-header"><div class="card-title">Nutricionista AI</div></div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:10px">Haz preguntas sobre tu dieta, nutrición o hábitos saludables.</p>
    <div class="chat-box" id="chat-box">
      <div class="msg ai">Hola ${pacienteActual.nombre}. Soy tu nutricionista AI. ¿En qué puedo ayudarte hoy?</div>
    </div>
    <div class="chat-input-row" style="margin-top:10px">
      <input id="chat-input" placeholder="Escribe tu pregunta..." onkeydown="if(event.key==='Enter')enviarChat()">
      <button class="btn btn-primary" onclick="enviarChat()">Enviar</button>
    </div>
  </div>`
}

async function enviarChat() {
  let input=document.getElementById('chat-input'), texto=input.value.trim()
  if (!texto) return; input.value=''
  let box=document.getElementById('chat-box')
  let msgUser=document.createElement('div'); msgUser.className='msg user'; msgUser.textContent=texto; box.appendChild(msgUser)
  let msgLoading=document.createElement('div'); msgLoading.className='msg loading'; msgLoading.textContent='Escribiendo...'; box.appendChild(msgLoading)
  box.scrollTop=box.scrollHeight; chatHistory.push({role:'user',content:texto})
  let systemPrompt=`Eres un nutricionista amable y experto. Responde en español de forma concisa (máximo 3 oraciones).\nContexto: Nombre: ${pacienteActual.nombre}, Objetivo: ${pacienteActual.objetivo}, Calorías: ${pacienteActual.calorias} kcal/día, Plan: ${pacienteActual.plan}.`
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:systemPrompt,messages:chatHistory})})
    const data=await res.json(), respuesta=(data.content||[]).map(b=>b.text||'').join('')
    chatHistory.push({role:'assistant',content:respuesta}); msgLoading.remove()
    let msgAI=document.createElement('div'); msgAI.className='msg ai'; msgAI.textContent=respuesta; box.appendChild(msgAI); box.scrollTop=box.scrollHeight
  } catch(e) { msgLoading.textContent='Error al conectar. Intenta de nuevo.' }
}
