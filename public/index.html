<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase, ref, set, get, update, onValue, push, remove
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // ⚠️ REEMPLAZA ESTOS VALORES CON LOS DE TU PROYECTO FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyBtmTeHLQWe14H20XUtu90BsoSJIbGEhHU",
    authDomain: "nutritrack-e6f2a.firebaseapp.com",
    databaseURL: "https://nutritrack-e6f2a-default-rtdb.firebaseio.com",
    projectId: "nutritrack-e6f2a",
    storageBucket: "nutritrack-e6f2a.firebasestorage.app",
    messagingSenderId: "341438034576",
    appId: "1:341438034576:web:95c9695295e89dd986de15",
    measurementId: "G-VJTN170P57"
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const db = getDatabase(firebaseApp);

  // ===== CAPA DE BASE DE DATOS =====
  // Exponer funciones globalmente para el código legacy
  window._db = {
    // --- Guardar nutricionista ---
    async guardarNutri(nutri) {
      await set(ref(db, `nutricionistas/${nutri.user}`), nutri);
    },
    // --- Obtener nutricionista ---
    async getNutri(user) {
      const snap = await get(ref(db, `nutricionistas/${user}`));
      return snap.exists() ? snap.val() : null;
    },
    // --- Guardar paciente ---
    async guardarPaciente(paciente) {
      await set(ref(db, `pacientes/${paciente.usuario}`), paciente);
    },
    // --- Obtener paciente ---
    async getPaciente(usuario) {
      const snap = await get(ref(db, `pacientes/${usuario}`));
      return snap.exists() ? snap.val() : null;
    },
    // --- Obtener todos los pacientes de un nutricionista ---
    async getPacientesDeNutri(nutriUser) {
      const snap = await get(ref(db, 'pacientes'));
      if (!snap.exists()) return [];
      const todos = snap.val();
      return Object.values(todos).filter(p => p.nutri === nutriUser);
    },
    // --- Obtener todos los pacientes (para ranking) ---
    async getTodosPacientes() {
      const snap = await get(ref(db, 'pacientes'));
      if (!snap.exists()) return [];
      return Object.values(snap.val());
    },
    // --- Escuchar cambios en tiempo real en un paciente ---
    escucharPaciente(usuario, callback) {
      return onValue(ref(db, `pacientes/${usuario}`), snap => {
        if (snap.exists()) callback(snap.val());
      });
    },
    // --- Escuchar cambios en tiempo real en pacientes de un nutri ---
    escucharPacientesNutri(nutriUser, callback) {
      return onValue(ref(db, 'pacientes'), snap => {
        if (!snap.exists()) { callback([]); return; }
        const todos = snap.val();
        callback(Object.values(todos).filter(p => p.nutri === nutriUser));
      });
    }
  };

  window._dbReady = true;
  window.dispatchEvent(new Event('dbReady'));
</script>

<script>
// ===== ESTADO GLOBAL =====
let pacienteActual = null
let nutriActual = null
let planSeleccionado = null
let _unsubscribePaciente = null   // listener tiempo real paciente
let _unsubscribeNutri = null      // listener tiempo real dashboard nutri
let chatHistory = []

// ===== ESPERAR A QUE FIREBASE ESTÉ LISTO =====
function esperarDB() {
  return new Promise(resolve => {
    if (window._dbReady) { resolve(); return; }
    const timeout = setTimeout(() => {
      console.warn("Firebase tardó demasiado, arrancando sin esperar.");
      resolve();
    }, 4000); // máximo 4 segundos de espera
    window.addEventListener('dbReady', () => {
      clearTimeout(timeout);
      resolve();
    }, { once: true });
  });
}

// ===== LOADER =====
function mostrarLoader(msg = "Cargando...") {
  // Usar siempre el loader fijo del body (nunca dentro de #app que se destruye)
  let l = document.getElementById("loader-global")
  if (!l) {
    l = document.createElement("div")
    l.id = "loader-global"
    l.className = "loading-overlay"
    document.body.appendChild(l)
  }
  l.innerHTML = `<div class="spinner"></div><span>${msg}</span>`
  l.style.display = "flex"
}
function ocultarLoader() {
  // Ocultar todos los posibles loaders
  ["loading-inicial","loading-temporal","loader-global"].forEach(id => {
    let el = document.getElementById(id)
    if (el) el.style.display = "none"
  })
}

// ===== LIMPIAR LISTENERS ANTERIORES =====
function limpiarListeners() {
  if (_unsubscribePaciente) { _unsubscribePaciente(); _unsubscribePaciente = null }
  if (_unsubscribeNutri) { _unsubscribeNutri(); _unsubscribeNutri = null }
}

// ===== UTILS =====
function calcularCalorias(peso, altura, edad, objetivo) {
  peso = parseFloat(peso); altura = parseFloat(altura); edad = parseFloat(edad)
  let base = (peso * 10) + (altura * 6.25) - (edad * 5) + 5
  if (objetivo == "Bajar peso") base -= 400
  if (objetivo == "Subir peso") base += 400
  return Math.round(base)
}

function formatearFecha(input) {
  let valor = input.value.replace(/\D/g, '')
  if (valor.length > 4) valor = valor.slice(0, 4)
  if (valor.length >= 2) {
    let mes = parseInt(valor.slice(0, 2))
    if (mes < 1) mes = 1
    if (mes > 12) mes = 12
    valor = mes.toString().padStart(2, '0') + valor.slice(2)
  }
  if (valor.length >= 4) input.value = valor.slice(0, 2) + "/" + valor.slice(2)
  else input.value = valor
}

function diaActual() {
  let dias = ["domingo","lunes","martes","miercoles","jueves","viernes","sabado"]
  return dias[new Date().getDay()]
}

function barraRacha() {
  let html = ""
  for (let i = 1; i <= 7; i++) {
    if (i <= pacienteActual.racha) html += "🔥 "
    else html += "⬜ "
  }
  return html
}

// ===== PLANES =====
const PLANES = {
  basico: {nombre:"Básico",precio:18,pacientes:"1 a 20",funciones:"básicas",color:"basico"},
  estandar: {nombre:"Estándar",precio:31,pacientes:"1 a 40",funciones:"básicas + AI",color:"estandar",popular:true},
  premium: {nombre:"Premium",precio:56,pacientes:"1 a 80",funciones:"avanzadas + AI + Dashboards",color:"premium",extraFeatures:["Dashboard de pacientes para nutricionista"]}
}

function renderPlanes(modo, origen) {
  return `
  <div class="planes-grid">
    ${Object.entries(PLANES).map(([key,p]) => `
    <div class="plan-card ${planSeleccionado==key?'selected':''}" id="plancard-${key}" onclick="elegirPlan('${key}','${modo}','${origen}')">
      <div class="check-selected">✓</div>
      <div class="plan-tag">Tu primer mes GRATIS</div>
      <div class="plan-body">
        <p class="plan-nombre">${p.nombre}${p.popular?'<span class="plan-popular">Más popular</span>':''}</p>
        <ul class="plan-features">
          <li>+30,000 recetas y plantillas.</li>
          <li>De ${p.pacientes} pacientes.</li>
          <li>Funciones <b>${p.funciones}</b>.</li>
          ${p.extraFeatures ? p.extraFeatures.map(f=>`<li>${f}</li>`).join("") : ""}
        </ul>
        <div class="plan-precio">$${p.precio} <span>usd</span>/mes</div>
        <div class="plan-sub">*Pago mensual</div>
        <button class="btn-plan btn-plan-${p.color}" style="width:100%">
          ${planSeleccionado==key?'✓ Seleccionado':'Probar Gratis'}
        </button>
      </div>
    </div>`).join('')}
  </div>`
}

function elegirPlan(key, modo, origen) {
  planSeleccionado = key
  if (modo == 'preview') {
    if (document.getElementById("seccion-planes")) {
      document.getElementById("seccion-planes").innerHTML = renderPlanes(modo, origen)
    }
    return
  }
  pantallaPago(modo, origen)
}

// ===== LOGIN NUTRICIONISTA =====
function loginNutri() {
  limpiarListeners()
  app.innerHTML = `
  <div class="card" style="max-width:400px;margin:40px auto;">
    <button onclick="inicio()" style="background:none;color:#888;font-size:13px;padding:0;margin-bottom:16px;">⬅ Volver</button>

    <button onclick="entrarNutri()" style="width:100%;padding:13px;font-size:15px;font-weight:700;">Iniciar sesión</button>

function registroNutri() {
  app.innerHTML = `
  <div class="card" style="max-width:400px;margin:40px auto;">
    <button onclick="loginNutri()" style="background:none;color:#888;font-size:13px;padding:0;margin-bottom:16px;">⬅ Volver al login</button>
    <h2 style="text-align:center;margin-bottom:4px;">📝 Crear cuenta</h2>
    <p style="text-align:center;color:#aaa;font-size:13px;margin-bottom:20px;">Regístrate como nutricionista</p>
    <input id="nuevoUserNutri" placeholder="Usuario" style="width:100%;margin-bottom:10px;">
    <input id="nuevoPassNutri" type="password" placeholder="Contraseña" style="width:100%;margin-bottom:16px;">
    <button onclick="registrarNutri()" style="width:100%;padding:13px;font-size:15px;font-weight:700;">Crear cuenta</button>
    <hr style="margin:20px 0;border-color:#eee;">
    <p style="text-align:center;font-size:14px;color:#888;margin:0;">¿Ya tienes cuenta? <span style="color:#4CAF50;font-weight:700;cursor:pointer;" onclick="loginNutri()">Inicia sesión</span></p>
  </div>`
}

async function registrarNutri() {
  let u = document.getElementById("nuevoUserNutri").value.trim()
  let p = document.getElementById("nuevoPassNutri").value
  if (!u || !p) { alert("Completa todos los campos"); return }
  mostrarLoader("Verificando usuario...")
  const existe = await window._db.getNutri(u)
  if (existe) { ocultarLoader(); alert("Este usuario ya existe ❌"); return }
  ocultarLoader()
  window._tempNutri = { user: u, pass: p }
  pantallaPlanYPago("nutricionista", "registro")
}

async function entrarNutri() {
  let u = document.getElementById("userNutri").value.trim()
  let p = document.getElementById("passNutri").value
  if (!u || !p) { alert("Completa todos los campos"); return }
  if (!window._dbReady) { mostrarLoader("Conectando con Firebase..."); await esperarDB() }
  mostrarLoader("Verificando...")
  try {
    const nutri = await window._db.getNutri(u)
    ocultarLoader()
    if (!nutri || nutri.pass !== p) { alert("Credenciales incorrectas ❌"); return }
    nutriActual = nutri
    dashboard()
  } catch(err) {
    ocultarLoader()
    console.error("Error al iniciar sesión:", err)
    alert("Error de conexión con Firebase ❌ Revisa tu internet e inténtalo de nuevo.")
  }
}

// ===== DASHBOARD NUTRICIONISTA (con tiempo real) =====
async function dashboard() {
  limpiarListeners()
  mostrarLoader("Cargando dashboard...")

  // Primera carga
  try {
    let misPacientes = await window._db.getPacientesDeNutri(nutriActual.user)
    ocultarLoader()
    renderDashboardCompleto(misPacientes)
  } catch(err) {
    ocultarLoader()
    console.error("Error cargando dashboard:", err)
    alert("Error al cargar el dashboard ❌ Revisa tu conexión.")
    return
  }

  // Escuchar cambios en tiempo real
  _unsubscribeNutri = window._db.escucharPacientesNutri(nutriActual.user, (pacientes) => {
    renderDashboardCompleto(pacientes)
  })
}

function renderDashboardCompleto(misPacientes) {
  let lista = ""
  misPacientes.forEach(p => {
    lista += `
    <div class="card">
      <b>${p.nombre}</b> <span style="font-size:12px;color:#888;background:#f0f0f0;padding:2px 8px;border-radius:10px;">${p.plan||'básico'}</span><br>
      ${p.fecha === new Date().toDateString() ? p.progreso + '% hoy' : '0% hoy (sin actividad)' }<br>
      <button onclick="crearDietaSemanal('${p.usuario}')">Dieta semanal</button>
      <button onclick="verNotificaciones('${p.usuario}')">Notificaciones</button>
      <button onclick="verPaciente('${p.usuario}')">Ver</button>
    </div>`
  })

  let dashboardPremium = ""
  if (nutriActual.plan == "premium") {
    dashboardPremium = `<div class="card" id="card-dashboard-nutri">
      <h2>📊 Dashboard Premium <span style="font-size:12px;color:#4CAF50;font-weight:700;">🔴 En vivo</span></h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
        <div style="flex:1;min-width:120px;background:#e8f5e9;border-radius:10px;padding:14px;text-align:center;">
          <div style="font-size:28px;font-weight:900;color:#2e7d32">${misPacientes.length}</div>
          <div style="font-size:12px;color:#666">Pacientes</div>
        </div>
        <div style="flex:1;min-width:120px;background:#e3f2fd;border-radius:10px;padding:14px;text-align:center;">
          <div style="font-size:28px;font-weight:900;color:#1565c0">${misPacientes.length ? Math.round(misPacientes.reduce((a,p)=>a+(p.progreso||0),0)/misPacientes.length) : 0}%</div>
          <div style="font-size:12px;color:#666">Promedio progreso</div>
        </div>
        <div style="flex:1;min-width:120px;background:#fff8e1;border-radius:10px;padding:14px;text-align:center;">
          <div style="font-size:28px;font-weight:900;color:#f57f17">${misPacientes.length ? Math.max(...misPacientes.map(p=>p.racha||0)) : 0}🔥</div>
          <div style="font-size:12px;color:#666">Mejor racha</div>
        </div>

function renderDashboardNutri(misPacientes) {
  let dias = ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"]
  let labels = dias.map(d => d.charAt(0).toUpperCase() + d.slice(1, 3))

  // Calcular el Date de cada día de la semana actual
  function getFechaParaDia(nombreDia) {
    const mapa = {lunes:1,martes:2,miercoles:3,jueves:4,viernes:5,sabado:6,domingo:0}
    let hoy = new Date()
    let diaHoy = hoy.getDay() // 0=domingo
    let diff = mapa[nombreDia] - diaHoy
    let fecha = new Date(hoy)
    fecha.setDate(hoy.getDate() + diff)
    return fecha.toDateString() // mismo formato que historialComidas
  }

  let data = dias.map(dia => {
    let fechaDia = getFechaParaDia(dia)
    let cumplieron = 0, conDieta = 0
    misPacientes.forEach(p => {
      let dieta = p.dietasemanal?.[dia]
      if (!dieta || !Object.values(dieta).some(v => v)) return // sin dieta asignada ese día
      conDieta++
      // Buscar en el historial si ese día específico tuvo 5 comidas
      let entrada = (p.historialComidas || []).find(h => h.fecha === fechaDia)
      if (entrada && entrada.comidas && entrada.comidas.length >= 5) cumplieron++
    })
    return conDieta > 0 ? Math.round((cumplieron / conDieta) * 100) : 0
  })

  let ctx = document.getElementById("grafica-nutri")
  if (!ctx) return
  if (window._chartNutri) window._chartNutri.destroy()
  window._chartNutri = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "% cumplimiento pacientes",
        data,
        backgroundColor: data.map(v => v>=70?"rgba(76,175,80,0.75)":v>=40?"rgba(255,167,38,0.75)":"rgba(239,83,80,0.75)"),
        borderRadius: 8, borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { font: { family: "Nunito" }, color: "#555" } } },
      scales: {
        y: { beginAtZero:true, max:100, ticks:{color:"#888",font:{family:"Nunito"},callback:v=>v+"%"}, grid:{color:"#f0f0f0"} },
        x: { ticks:{color:"#888",font:{family:"Nunito"}}, grid:{display:false} }
      }
    }
  })

  let sorted = [...misPacientes].sort((a,b) => (b.racha||0)-(a.racha||0))
  let mejores = sorted.slice(0, 3)
  let peores = sorted.slice(-3).reverse().filter(p => (p.racha||0) < 3)
  let medals = ["🥇","🥈","🥉"]

  let mejoresDiv = document.getElementById("mejores-rachas")
  let peoresDiv = document.getElementById("peores-rachas")
  if (!mejoresDiv || !peoresDiv) return

  mejoresDiv.innerHTML = mejores.map((p,i) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;background:#f9f9f9;margin-bottom:6px;">
      <span>${medals[i]} <b>${p.nombre}</b></span>
      <span style="background:#FF7043;color:white;border-radius:12px;padding:2px 10px;font-size:13px;">${p.racha||0} 🔥 días</span>
    </div>`).join("") || "<p style='color:#aaa;font-size:13px'>Sin datos aún.</p>"

  peoresDiv.innerHTML = peores.length ? peores.map(p => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;background:#fff8f8;margin-bottom:6px;border-left:3px solid #EF5350;">
      <span>⚠️ <b>${p.nombre}</b></span>
      <span style="background:#EF5350;color:white;border-radius:12px;padding:2px 10px;font-size:13px;">${p.racha||0} días racha</span>
    </div>`).join("") : "<p style='color:#aaa;font-size:13px'>¡Todos van bien! 🎉</p>"
}

// ===== MARCAR COMIDA (guarda en Firebase) =====
async function marcarComida(tipo) {
  if (pacienteActual.comidas[tipo]) { alert("Ya marcaste esta comida ✅"); return }
  pacienteActual.comidas[tipo] = true
  pacienteActual.progreso += 20
  if (pacienteActual.progreso > 100) pacienteActual.progreso = 100

  if (!pacienteActual.historialComidas) pacienteActual.historialComidas = []
  let hoy = new Date().toDateString()
  let entradaHoy = pacienteActual.historialComidas.find(h => h.fecha == hoy)
  if (!entradaHoy) {
    entradaHoy = { fecha: hoy, comidas: [], calorias: 0 }
    pacienteActual.historialComidas.push(entradaHoy)
  }
  let calPorComida = {
    desayuno: Math.round(pacienteActual.calorias*0.25),
    refa1: Math.round(pacienteActual.calorias*0.1),
    almuerzo: Math.round(pacienteActual.calorias*0.35),
    refa2: Math.round(pacienteActual.calorias*0.1),
    cena: Math.round(pacienteActual.calorias*0.2)
  }
  entradaHoy.comidas.push(tipo)
  entradaHoy.calorias += calPorComida[tipo] || 0

  if (pacienteActual.progreso == 100) {
    pacienteActual.racha += 1
    alert("🎉 ¡Felicidades! Completaste tu día. Racha actual: " + pacienteActual.racha)
  }

  // Guardar en Firebase (el listener actualizará la UI automáticamente)
  await window._db.guardarPaciente(pacienteActual)
  panelPaciente()
}

function renderDashboard() {
  if (!pacienteActual || pacienteActual.plan != "premium") return
  let historial = (pacienteActual.historialComidas||[]).slice(-7)
  let diasSemana = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"]
  let labels = historial.map(h => { let d = new Date(h.fecha); return diasSemana[d.getDay()] })
  let dataKcal = historial.map(h => h.calorias || 0)
  let meta = pacienteActual.calorias || 2000
  let ctx = document.getElementById("grafica-calorias")
  if (!ctx) return
  if (window._chartInstance) window._chartInstance.destroy()
  window._chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels.length ? labels : ["Sin datos"],
      datasets: [
        { label:"Calorías consumidas", data: dataKcal.length ? dataKcal : [0], backgroundColor:"rgba(76,175,80,0.7)", borderRadius:8, borderSkipped:false },
        { label:"Meta diaria", data: labels.map(()=>meta), type:"line", borderColor:"#FF7043", borderDash:[6,4], pointRadius:0, borderWidth:2, fill:false }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend:{labels:{font:{family:"Nunito"},color:"#555"}}, tooltip:{callbacks:{label:ctx=>ctx.dataset.label+": "+ctx.parsed.y+" kcal"}} },
      scales: { y:{beginAtZero:true,ticks:{color:"#888",font:{family:"Nunito"}},grid:{color:"#f0f0f0"}}, x:{ticks:{color:"#888",font:{family:"Nunito"}},grid:{display:false}} }
    }
  })
  let nombres = {desayuno:"🍳 Desayuno",refa1:"🍎 Refa 1",almuerzo:"🍛 Almuerzo",refa2:"🥪 Refa 2",cena:"🌙 Cena"}
  let histDiv = document.getElementById("historial-comidas")
  if (!histDiv) return
  if (historial.length === 0) { histDiv.innerHTML = "<p style='color:#aaa;font-size:13px'>Aún no hay historial.</p>"; return }
  let html = ""
  ;[...historial].reverse().forEach(h => {
    let d = new Date(h.fecha)
    let label = h.fecha===new Date().toDateString()?"Hoy":diasSemana[d.getDay()]+" "+d.getDate()
    let chips = (h.comidas||[]).map(c=>`<span style="background:#e8f5e9;color:#2e7d32;border-radius:20px;padding:2px 9px;font-size:12px;margin:2px 2px 0 0;display:inline-block;">${nombres[c]||c}</span>`).join("")
    let pct = Math.round((h.calorias/meta)*100)
    let barColor = pct>=90?"#4CAF50":pct>=60?"#FFA726":"#EF5350"
    html+=`<div style="border-left:3px solid ${barColor};padding:8px 12px;margin-bottom:8px;background:#fafafa;border-radius:0 8px 8px 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;"><b style="font-size:14px">${label}</b><span style="font-size:12px;color:#888">${h.calorias} kcal <span style="color:${barColor};font-weight:700">(${pct}%)</span></span></div>
      <div style="margin-top:5px">${chips||"<span style='color:#ccc;font-size:12px'>Sin comidas</span>"}</div>
    </div>`
  })
  histDiv.innerHTML = html
}

async function pedido() {
  let tipo = document.getElementById("tipoComida").value
  let direccion = document.getElementById("direccion").value.trim()
  let pago = document.getElementById("metodoPago").value
  let hoy = diaActual()
  let comida = pacienteActual.dietasemanal?.[hoy]?.[tipo] || null

  if (!direccion) { alert("Por favor ingresa tu dirección de entrega 📍"); return }

  if (!comida) {
    if (!pacienteActual.notificaciones) pacienteActual.notificaciones = []
    pacienteActual.notificaciones.push({ dia: hoy, tipo })
    await window._db.guardarPaciente(pacienteActual)
    mostrarConfirmacion("⚠️ No tienes dieta asignada para esta comida. Se notificó a tu nutricionista.")
    return
  }

  let cambio = ""
  if (pago == "efectivo") {
    let billete = parseFloat(document.getElementById("billete").value)
    if (!billete || billete <= 0) { alert("Ingresa el monto con el que pagarás 💵"); return }
    cambio = `Llevaremos cambio para Q${billete}.`
  }
  mostrarConfirmacion(`✅ Pedido confirmado\n\n🍽️ ${comida}\n📍 ${direccion}\n💳 ${pago=="efectivo"?"Efectivo":"Tarjeta"}\n${cambio}`)
}

async function procesarPago(tipo, origen) {
  let tarjeta = document.getElementById("numTarjeta").value
  let fecha = document.getElementById("fechaVenc").value
  let cvv = document.getElementById("cvv").value
  if (tarjeta.length != 12 || isNaN(tarjeta)) { alert("Número de tarjeta inválido ❌"); return }
  if (cvv.length != 3 || isNaN(cvv)) { alert("CVV inválido ❌"); return }
  if (!fecha.match(/^\d{2}\/\d{2}$/)) { alert("Fecha inválida ❌"); return }
  alert("✅ Pago procesado")

  mostrarLoader("Guardando en Firebase...")

  try {
    if (origen == "registro" && tipo == "nutricionista") {
      let temp = window._tempNutri
      if (!temp) { ocultarLoader(); alert("Error: datos de registro perdidos. Por favor regístrate de nuevo ❌"); loginNutri(); return }
      temp.plan = planSeleccionado || "basico"
      await window._db.guardarNutri(temp)
      window._tempNutri = null
      ocultarLoader()
      alert("Nutricionista registrado ✅")
      loginNutri()
      return
    }
    if (origen == "nutri") {
      let temp = window._tempPaciente
      if (!temp) { ocultarLoader(); alert("Error: datos del paciente perdidos. Por favor inténtalo de nuevo ❌"); dashboard(); return }
      temp.plan = planSeleccionado || "basico"
      await window._db.guardarPaciente(temp)
      window._tempPaciente = null
      ocultarLoader()
      alert("Paciente creado correctamente ✅")
      dashboard()
      return
    }
    ocultarLoader()
    if (tipo == "nutricionista") loginNutri()
    else loginPaciente()
  } catch(err) {
    ocultarLoader()
    console.error("Error guardando en Firebase:", err)
    alert("Error al guardar en Firebase ❌ Revisa tu conexión e inténtalo de nuevo.")
  }
}

const INSIGNIAS = [
  {id:"primer_reto", emoji:"🌱", nombre:"Primer paso", desc:"Completa tu primer reto"},
  {id:"racha3",      emoji:"🔥", nombre:"En llamas",   desc:"Completa 3 retos seguidos"},

  {id:"retos10",     emoji:"💎", nombre:"Diamante",    desc:"Completa 10 retos en total"},
  {id:"ai_reto",     emoji:"🤖", nombre:"AI Warrior",  desc:"Completa un reto generado por AI"},
]

function tieneInsignia(p, id) { return (p.insignias||[]).includes(id) }

async function otorgarInsignia(p, id) {
  if (!p.insignias) p.insignias = []
  if (!p.insignias.includes(id)) {
    p.insignias.push(id)
    let ins = INSIGNIAS.find(i => i.id == id)
    await window._db.guardarPaciente(p)
    setTimeout(() => alert("🎖️ ¡Nueva insignia desbloqueada!\n" + ins.emoji + " " + ins.nombre + "\n\"" + ins.desc + "\""), 300)
  }
}

async function completarReto(idx) {
  if (!pacienteActual) return
  let retos = pacienteActual.retos || []
  let r = retos[idx]
  if (!r || r.completado) return
  r.completado = true
  r.fechaCompletado = new Date().toDateString()
  if (!pacienteActual.retosCompletados) pacienteActual.retosCompletados = 0
  pacienteActual.retosCompletados++
  if (pacienteActual.retosCompletados === 1) await otorgarInsignia(pacienteActual, "primer_reto")
  if (pacienteActual.retosCompletados >= 5) await otorgarInsignia(pacienteActual, "retos5")
  if (pacienteActual.retosCompletados >= 10) await otorgarInsignia(pacienteActual, "retos10")
  if (r.esAI) await otorgarInsignia(pacienteActual, "ai_reto")
  await window._db.guardarPaciente(pacienteActual)
  paginaRetos()
}

async function generarRetoAI() {
  if (!tieneAI()) { alert("🔒 Función disponible en planes Estándar y Premium"); return }
  let btn = document.getElementById("btn-generar-ai")
  if (btn) { btn.disabled = true; btn.textContent = "⏳ Generando..." }
  let promptText = "Eres un nutricionista experto. Genera UN reto nutricional creativo y motivador para este paciente. Responde SOLO con JSON así (sin markdown): {\"titulo\":\"...\",\"descripcion\":\"...\",\"duracion\":\"X días\",\"dificultad\":\"Fácil|Medio|Difícil\"}\nPaciente: Nombre: "+pacienteActual.nombre+", Objetivo: "+pacienteActual.objetivo+", Racha: "+pacienteActual.racha+" días."
  try {
    const res = await fetch("/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:300, messages:[{role:"user",content:promptText}] })
    })
    const data = await res.json()
    let texto = data.content.map(b => b.text || "").join("").replace(/```json|```/g, "").trim()
    let retoAI = JSON.parse(texto)
    retoAI.esAI = true; retoAI.completado = false; retoAI.fechaCreado = new Date().toDateString()
    if (!pacienteActual.retos) pacienteActual.retos = []
    pacienteActual.retos.unshift(retoAI)
    await window._db.guardarPaciente(pacienteActual)
    paginaRetos()
  } catch(e) {
    alert("❌ Error al generar reto. Intenta de nuevo.")
    if (btn) { btn.disabled = false; btn.textContent = "🤖 Generar reto con AI" }
  }
}

  box.appendChild(msgUser)
  let msgLoading = document.createElement("div")
  msgLoading.className = "msg loading"
  msgLoading.textContent = "✍️ Escribiendo..."
  box.appendChild(msgLoading)
  box.scrollTop = box.scrollHeight
  chatHistory.push({ role:"user", content: texto })

  let systemPrompt = `Eres un nutricionista amable y experto. Responde en español de forma concisa (máximo 3 oraciones).\nContexto del paciente: Nombre: ${pacienteActual.nombre}, Objetivo: ${pacienteActual.objetivo}, Calorías: ${pacienteActual.calorias} kcal/día, Plan: ${pacienteActual.plan}.`

  try {
    const res = await fetch("/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system: systemPrompt, messages: chatHistory })
    })
    const data = await res.json()
    const respuesta = data.content.map(b => b.text || '').join('')
    chatHistory.push({ role:"assistant", content: respuesta })
    msgLoading.remove()
    let msgAI = document.createElement("div")
    msgAI.className = "msg ai"
    msgAI.textContent = respuesta
    box.appendChild(msgAI)
    box.scrollTop = box.scrollHeight
  } catch(e) {
    msgLoading.textContent = "❌ Error al conectar. Intenta de nuevo."
  }
}

// ===== ARRANCAR APP =====
// La app arranca INMEDIATAMENTE, Firebase conecta en segundo plano
ocultarLoader()
inicio()
</script>
</body>
</html>
